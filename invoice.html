<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>发票开具 - 发票管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container">
    <!-- 顶部导航 -->
    <header class="header">
      <a href="index.html" class="back-btn"></a>
      <h1 class="title">发票管理</h1>
    </header>

    <!-- 标签切换 -->
    <div class="tab-header">
      <div class="tab-item active" data-tab="pending-tab">待开票</div>
      <div class="tab-item" data-tab="completed-tab">已开票</div>
    </div>

    <!-- 待开票标签页 -->
    <div id="pending-tab" class="tab-pane active">
      <!-- 筛选区域 -->
      <div class="filter-section">
        <div class="filter-row">
          <label class="filter-label">交易时间</label>
          <div class="filter-inputs">
            <input type="date" id="date-start" placeholder="开始日期">
            <span class="date-separator">至</span>
            <input type="date" id="date-end" placeholder="结束日期">
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn" onclick="resetFilter()">重置</button>
          <button class="btn btn-primary" onclick="handleSearch()">查询</button>
        </div>
      </div>

      <!-- 列表区域 -->
      <div class="list-section">
        <div id="pending-invoice-list">
          <!-- 发票列表项将由JS动态渲染 -->
        </div>
      </div>

      <!-- 底部操作栏 -->
      <div class="bottom-bar" id="bottom-bar" style="display: none;">
        <div class="selected-info">
          已选中 <span class="count">0</span> 条，合计金额 <span class="total">¥0.00</span>
        </div>
        <button class="btn btn-primary" id="confirm-btn" onclick="confirmBatchInvoice()">开具</button>
      </div>
    </div>

    <!-- 已开票标签页 -->
    <div id="completed-tab" class="tab-pane">
      <!-- 筛选区域 -->
      <div class="filter-section">
        <div class="filter-row">
          <label class="filter-label">开票日期</label>
          <div class="filter-inputs">
            <input type="date" id="completed-date-start" placeholder="开始日期">
            <span class="date-separator">至</span>
            <input type="date" id="completed-date-end" placeholder="结束日期">
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn" onclick="resetFilter()">重置</button>
          <button class="btn btn-primary" onclick="handleSearch()">查询</button>
        </div>
      </div>

      <!-- 列表区域 -->
      <div class="list-section">
        <div id="completed-invoice-list">
          <!-- 发票列表项将由JS动态渲染 -->
        </div>
      </div>

      <!-- 底部操作栏 -->
      <div class="bottom-bar" id="completed-bottom-bar" style="display: none;">
        <div class="selected-info">
          已选中 <span class="count">0</span> 条
        </div>
        <button class="btn btn-cancel" onclick="cancelCompletedSelectMode()">取消</button>
        <button class="btn btn-primary" id="completed-confirm-btn" onclick="confirmBatchSendEmail()">确认发送</button>
      </div>
    </div>

    <!-- 开具确认弹窗 -->
    <div id="invoice-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">开具发票</span>
          <span class="modal-close">×</span>
        </div>
        <div class="modal-body">
          <!-- 发票类型选择 -->
          <div class="invoice-type-selector">
            <div class="type-option active" data-type="pupiao">
              <div class="type-name">增值税普通发票</div>
              <div class="type-desc">适用于个人或小规模纳税人</div>
            </div>
            <div class="type-option" data-type="zhuanpiao">
              <div class="type-name">增值税专用发票</div>
              <div class="type-desc">适用于一般纳税人</div>
            </div>
          </div>

          <!-- 购买方信息表单 -->
          <div class="form-group">
            <label class="form-label">购买方名称 <span class="required">*</span></label>
            <input type="text" placeholder="请输入购买方名称">
          </div>

          <div class="form-group">
            <label class="form-label">纳税人识别号 <span class="required">*</span></label>
            <input type="text" placeholder="请输入纳税人识别号">
          </div>

          <div class="form-group zhuanpiao-field" style="display: none;">
            <label class="form-label">地址、电话 <span class="required">*</span></label>
            <textarea placeholder="请输入地址和电话"></textarea>
          </div>

          <div class="form-group zhuanpiao-field" style="display: none;">
            <label class="form-label">开户行及账号 <span class="required">*</span></label>
            <textarea placeholder="请输入开户行和账号"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">备注</label>
            <textarea placeholder="请输入备注信息（选填）"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="document.getElementById('invoice-modal').classList.remove('show')">取消</button>
          <button class="btn btn-primary" onclick="confirmInvoice()">确认开具</button>
        </div>
      </div>
    </div>

    <!-- 发送邮箱弹窗 -->
    <div id="email-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">发送至邮箱</span>
          <span class="modal-close" onclick="closeEmailModal()">×</span>
        </div>
        <div class="modal-body">
          <div class="email-info" id="email-invoice-info">
            <!-- 发票信息将动态填充 -->
          </div>
          <div class="form-group">
            <label class="form-label">接收邮箱 <span class="required">*</span></label>
            <input type="email" id="email-input" placeholder="请输入接收邮箱地址">
          </div>
          <div class="form-group">
            <label class="form-label">备注（选填）</label>
            <textarea id="email-remark" placeholder="请输入备注信息"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeEmailModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmSendEmail()">确认发送</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
